services:
  # The PostgreSQL Database Service
  db:
    image: postgres:15-alpine # Use the official PostgreSQL 15 image, 'alpine' is a lightweight version
    container_name: iav-db
    restart: always # Always restart the container if it stops
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=letmeinfast
      - POSTGRES_DB=postgres
    ports:
      - "6543:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data # Persist database data even if the container is removed

  # The Go Backend Service
  backend:
    container_name: iav-backend
    build:
      context: ./backend # Tell Docker to build the image using the Dockerfile in the 'backend' folder
      dockerfile: Dockerfile.dev
    restart: always
    ports:
      - "8080:8080" # Map port 8080 on your machine to our Go app's port 8080 in the container
    environment:
      # This is the connection string our Go app will use to find the database.
      # 'db' is the service name of our postgres container. Docker handles the networking.
      - DATABASE_URL=postgres://postgres:letmeinfast@db:5432/postgres?sslmode=disable
    depends_on:
      - db # Tell this service to wait until the 'db' service is started before it starts
    command: air -c .air.toml
    volumes:
      - ./backend:/app

  # The Next.js Frontend Service
  frontend:
    container_name: iav-frontend
    build: ./frontend # Build using the Dockerfile in the 'frontend' folder
    restart: always
    ports:
      - "3000:3000" # Map port 3000 for Next.js
    volumes:
      # This mounts your local code into the container, allowing for hot-reloading on changes.
      - ./frontend:/app
      # This prevents the local node_modules from overwriting the one inside the container.
      - /app/node_modules
    depends_on:
      - backend # Wait for the backend to be ready
    command: npm run dev

volumes:
  postgres_data: # Define the named volume for data persistence
