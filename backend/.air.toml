# .air.toml
# Configuration for 'air' hot-reloader

root = "."
tmp_dir = "tmp"

[build]
# CRITICAL: This tells Go to look in the 'cmd/api' folder for your main.go file.
cmd = "go build -o ./tmp/main ./cmd/api"
# The binary to run after build
bin = "./tmp/main"
# Watch these extensions
include_ext = ["go", "tpl", "tmpl", "html"]
# Ignore these directories
exclude_dir = ["uploads", "tmp", "migrations"]
# Delay in ms
delay = 1000
# Stop on error
stop_on_error = true
log = "air-build.log"

[log]
time = true

[misc]
clean_on_exit = true